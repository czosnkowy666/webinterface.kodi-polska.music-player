<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kodi Polska Music Web Player</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.svg" sizes="any"/>
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <header>
    <h1 id="main-title">Loading</h1>
    <ul class="navigation">
      <li id="nav-artist">Artists</li>
      <li id="nav-playlist">Playlists</li>
      <li id="nav-file">Files</li>
    </ul>
  </header>
  <main>
  <div id="panels">
  </div>
  </main>
  <footer>
    <div id="footer-panel">
      <div id="player-panel">
        <div class="audio"><audio id="player" controls></audio></div>
        <div id="status" style="margin-left:14px" class="muted">&nbsp;</div>
      </div>
    <div class="coptright">Kodi Polska 🎵 Music Player <a href="https://github.com/czosnkowy666/webinterface.kodi-polska.music-player" target="_blank" class="version">0.0.1</a></div>
    </div>
  </footer>
  <template id="tpl-panel">
    <div class="panel">
      <div class="panel-header"></div>
      <div class="panel-list">Loading ...</div>
    </div>
</template> 

<template id="tpl-list-row">
    <div class="list-row">
      <h3 class="list-title"></h3>
      <div class="list-action"></div>
    </div>
</template>

<script type="text/javascript" src="./js/main.js"></script>
</script>
</body>
</html>
